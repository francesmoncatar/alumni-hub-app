<!DOCTYPE html>
<html lang="en" ng-app="profileApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Document Portal</title>
    <link rel="stylesheet" href="style1.css">
    <script src="js/angular.min.js"></script>
</head>
<body ng-controller="ProfileController">

    <div class="mobile-container">
        
        <header class="header-blue">
            <div class="header-content">
                <span class="back-arrow">←</span>
                <h1>My Profile</h1>
            </div>
        </header>

        <main class="profile-content">
            
            <section class="profile-main-info">
                <div class="avatar-container">
                    <svg viewBox="0 0 128 128" class="avatar-svg">
                        <circle cx="64" cy="64" r="62" fill="#888"/>
                        <circle cx="64" cy="45" r="23" fill="white"/>
                        <path d="M102,110 C90,85 40,85 28,110 A60,60 0 0,0 102,110 Z" fill="white"/>
                    </svg>
                </div>
                <h2 ng-bind="profile.fullName"></h2>
                <span class="status-badge" ng-bind="profile.role"></span>
            </section>

            <hr class="section-divider">

            <section class="info-section">
                <h3>Account Information</h3>
                
                <div class="info-item">
                    <span class="info-icon">📧</span>
                    <div class="info-text">
                        <label>Email</label>
                        <p ng-bind="profile.email"></p>
                    </div>
                </div>

                <div class="info-item">
                    <span class="info-icon">🆔</span>
                    <div class="info-text">
                        <label>Student ID</label>
                        <p ng-bind="profile.studentId"></p>
                    </div>
                </div>

                <div class="info-item">
                    <span class="info-icon">👥</span>
                    <div class="info-text">
                        <label>Account Type</label>
                        <p ng-bind="profile.accountType"></p>
                    </div>
                </div>
            </section>

            <hr class="section-divider">

            <section class="info-section">
                <h3>Quick Information</h3>
                
                <div class="nav-item-link">
                    <span class="info-icon">📋</span>
                    <span class="link-label">My Request</span>
                    <span class="link-arrow">></span>
                </div>
            </section>

            <hr class="section-divider">

            <div class="logout-container">
                <button class="btn-logout">
                    <span class="logout-icon">↩</span> Logout
                </button>
            </div>

        </main>

        <nav class="bottom-nav">
            <div class="nav-item active">
                <div class="icon-bubble">👤</div>
                <span>My Profile</span>
            </div>
            <div class="nav-item">
                <div class="icon-plain">⊞</div>
                <span>Dashboard</span>
            </div>
            <div class="nav-item">
                <div class="icon-plain">📋</div>
                <span>History</span>
            </div>
        </nav>
    </div>

    <script src="app1.js"></script>
</body>
</html>
