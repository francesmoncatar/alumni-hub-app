<!DOCTYPE html>
<html lang="en" ng-app="staffApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal</title>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1d3580">
    <link rel="stylesheet" href="style3.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>[ng-cloak] { display: none !important; }</style>
</head>
<body ng-controller="StaffCtrl" ng-cloak>
    <div class="mobile-container">
        <header class="header-blue">
            <div class="header-top">
                <span class="back-arrow">←</span>
                <div class="header-text">
                    <h1>Staff Management</h1>
                    <p>Manage Document Requests</p>
                </div>
            </div>
        </header>

        <main class="content">
            <section class="filter-section">
                <div class="filter-label">▽ Filter by Status</div>
                <div class="chip-container">
                    <button class="chip" ng-class="{'active': activeFilter === 'All'}" ng-click="setFilter('All')">All</button>
                    <button class="chip" ng-class="{'active': activeFilter === 'Pending'}" ng-click="setFilter('Pending')">Pending</button>
                    <button class="chip" ng-class="{'active': activeFilter === 'Approved'}" ng-click="setFilter('Approved')">Approved</button>
                </div>
            </section>

            <section class="stats-card">
                <div class="stat-item"><span class="stat-count dark" ng-bind="requests.length"></span><span class="stat-label">Total</span></div>
                <div class="stat-item"><span class="stat-count orange">1</span><span class="stat-label">Pending</span></div>
                <div class="stat-item"><span class="stat-count blue">1</span><span class="stat-label">Approved</span></div>
                <div class="stat-item"><span class="stat-count green">1</span><span class="stat-label">Ready</span></div>
            </section>

            <section class="request-list">
                <div class="request-card" ng-repeat="req in requests | filter:statusFilter">
                    <div class="card-header">
                        <h3 ng-bind="req.documentName"></h3>
                        <span class="badge" ng-class="req.statusClass">
                            <span ng-if="req.status === 'Approved'">✓ 📦 🕒</span>
                            <span ng-bind="req.status"></span>
                        </span>
                    </div>
                    <p class="ref-no">Ref: <span ng-bind="req.ref"></span></p>
                    <div class="user-info">👥 <span ng-bind="req.studentName"></span></div>
                    <div class="date-time">
                        <span>📅 <span ng-bind="req.date"></span></span>
                        <span>🕒 <span ng-bind="req.time"></span></span>
                    </div>
                    <hr class="divider">
                    <div class="btn-group" ng-if="req.status === 'Pending'">
                        <button class="btn-approve">✓ Approve</button>
                        <button class="btn-reject">✕ Reject</button>
                    </div>
                    <button class="btn-ready" ng-if="req.status === 'Approved'">📦 Mark as Ready for Pickup</button>
                    <div class="ready-banner" ng-if="req.status === 'Ready for Pickup'">Ready for pickup - awaiting collection</div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item">👤<p>My Profile</p></div>
            <div class="nav-item active"><div class="icon-square">⊞</div><p>Dashboard</p></div>
            <div class="nav-item">📋<p>Orders</p></div>
        </nav>
    </div>
    <script src="app3.js"></script>

 <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Service worker registered from: ' + window.location.pathname))
      .catch(err => console.log('Service worker registration failed', err));
  }
</script>
</body>
</html>
